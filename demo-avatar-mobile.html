<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Avatar Mobile Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
      }

      .page-note {
        padding: 16px;
        color: #111827;
        font-size: 14px;
      }

      #chat-toggle-container {
        position: fixed;
        bottom: 64px;
        right: 64px;
        z-index: 50;
        overflow: visible;
      }

      #chat-toggle {
        position: relative;
        border: none;
        border-radius: 9999px;
        padding: 2px;
        cursor: pointer;
        background: #1f1f1f;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }

      #chat-icon {
        width: 56px;
        height: 56px;
        border-radius: 9999px;
        object-fit: cover;
        object-position: top;
        display: block;
      }

      #mobile-avatar-dismiss {
        display: none;
        position: absolute;
        top: 50%;
        left: -12px;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 1px solid #ef4444;
        background: #000000;
        color: #ef4444;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
        z-index: 9999;
      }

      #mobile-avatar-dismiss svg {
        width: 20px;
        height: 20px;
      }

      @media (max-width: 767px) {
        #chat-toggle.mobile-avatar {
          transform: scale(0.9);
          transform-origin: bottom right;
        }

        #chat-toggle.mobile-avatar:hover {
          transform: scale(0.9);
        }

        #mobile-avatar-dismiss {
          display: flex;
        }

        #chat-toggle-container {
          right: 20px;
          bottom: 24px;
        }
      }

      .controls {
        position: fixed;
        left: 16px;
        bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="page-note">
      Resize browser to mobile width (<= 767px). Click red cross to hide avatar for this
      session.
    </div>

    <div id="chat-toggle-container">
      <button id="mobile-avatar-dismiss" aria-label="Dismiss chat avatar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
      <button id="chat-toggle" aria-label="Open chat">
        <img
          id="chat-icon"
          src="https://ryder-media.netlify.app/agent.gif"
          alt="Agent Avatar"
        />
      </button>
    </div>

    <div class="controls">
      <button id="reset-session">Reset sessionStorage</button>
    </div>

    <script>
      const isMobileView = () => window.matchMedia("(max-width: 767px)").matches;

      const getEls = () => ({
        chatToggle: document.getElementById("chat-toggle"),
        chatToggleContainer: document.getElementById("chat-toggle-container"),
        mobileAvatarDismiss: document.getElementById("mobile-avatar-dismiss"),
        resetSession: document.getElementById("reset-session"),
      });

      const hideMobileAvatarForSession = () => {
        if (!isMobileView()) return;
        const { chatToggleContainer } = getEls();
        if (chatToggleContainer) chatToggleContainer.style.display = "none";
        sessionStorage.setItem("chatbot_avatar_hidden", "true");
      };

      const applyMobileAvatarState = () => {
        const { chatToggle, chatToggleContainer } = getEls();
        const shouldHide = sessionStorage.getItem("chatbot_avatar_hidden") === "true";

        if (chatToggle) {
          if (isMobileView()) chatToggle.classList.add("mobile-avatar");
          else chatToggle.classList.remove("mobile-avatar");
        }

        if (chatToggleContainer) {
          if (isMobileView() && shouldHide) chatToggleContainer.style.display = "none";
          else chatToggleContainer.style.display = "block";
        }
      };

      const bindEvents = () => {
        const { mobileAvatarDismiss, resetSession } = getEls();
        if (mobileAvatarDismiss) {
          mobileAvatarDismiss.addEventListener("click", (e) => {
            e.stopPropagation();
            hideMobileAvatarForSession();
          });
        }
        if (resetSession) {
          resetSession.addEventListener("click", () => {
            sessionStorage.removeItem("chatbot_avatar_hidden");
            applyMobileAvatarState();
          });
        }
        window.addEventListener("resize", applyMobileAvatarState);
      };

      bindEvents();
      applyMobileAvatarState();
    </script>
  </body>
</html>
